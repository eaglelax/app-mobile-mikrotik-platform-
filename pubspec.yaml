name: mikrotik_manager
description: Application mobile de gestion de réseaux MikroTik
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'
  flutter: '>=3.16.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  # State management
  provider: ^6.1.1
  # HTTP & API
  http: ^1.2.0
  # Local storage
  shared_preferences: ^2.2.2
  # UI
  fl_chart: ^0.66.0
  qr_flutter: ^4.1.0
  google_fonts: ^6.1.0
  shimmer: ^3.0.0
  # Utilities
  intl: any
  timeago: ^3.6.1
  url_launcher: ^6.2.2
  connectivity_plus: ^5.0.2
  # QR Scanner
  mobile_scanner: ^4.0.1
  # Pull to refresh
  pull_to_refresh: ^2.0.0
  # PDF generation & sharing
  pdf: ^3.10.8
  share_plus: ^7.2.2
  path_provider: ^2.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/
